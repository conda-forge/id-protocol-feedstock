schema_version: 1

context:
  version: "0.3.0"
  python_min: "3.11"

package:
  name: id-protocol
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/i/id-protocol/id_protocol-${{ version }}.tar.gz
  sha256: f9162104bb5476356cd1426e96f5da93c2cb2a760532c73691aa09081c44c474

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - idctl = idcli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - idcli
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - idctl --help

about:
  summary: Portable human-AI context protocol reference tooling
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/markoblogo/ID
  repository: https://github.com/markoblogo/ID

extra:
  recipe-maintainers:
    - markoblogo
